<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- QR Code pattern (simplified) -->
  <g fill="white">
    <!-- Top-left position marker -->
    <rect x="18" y="18" width="18" height="18" rx="2"/>
    <rect x="21" y="21" width="12" height="12" fill="url(#grad)" rx="1"/>
    <rect x="24" y="24" width="6" height="6" rx="1"/>
    
    <!-- Top-right position marker -->
    <rect x="64" y="18" width="18" height="18" rx="2"/>
    <rect x="67" y="21" width="12" height="12" fill="url(#grad)" rx="1"/>
    <rect x="70" y="24" width="6" height="6" rx="1"/>
    
    <!-- Bottom-left position marker -->
    <rect x="18" y="64" width="18" height="18" rx="2"/>
    <rect x="21" y="67" width="12" height="12" fill="url(#grad)" rx="1"/>
    <rect x="24" y="70" width="6" height="6" rx="1"/>
    
    <!-- Data modules -->
    <rect x="42" y="18" width="6" height="6" rx="1"/>
    <rect x="50" y="18" width="6" height="6" rx="1"/>
    
    <rect x="18" y="42" width="6" height="6" rx="1"/>
    <rect x="26" y="42" width="6" height="6" rx="1"/>
    
    <rect x="42" y="42" width="6" height="6" rx="1"/>
    <rect x="50" y="42" width="6" height="6" rx="1"/>
    
    <rect x="64" y="42" width="6" height="6" rx="1"/>
    <rect x="76" y="42" width="6" height="6" rx="1"/>
    
    <rect x="42" y="50" width="6" height="6" rx="1"/>
    
    <rect x="42" y="64" width="6" height="6" rx="1"/>
    <rect x="50" y="64" width="6" height="6" rx="1"/>
    <rect x="64" y="64" width="6" height="6" rx="1"/>
    <rect x="76" y="64" width="6" height="6" rx="1"/>
    
    <rect x="42" y="76" width="6" height="6" rx="1"/>
    <rect x="64" y="76" width="6" height="6" rx="1"/>
  </g>
</svg>
